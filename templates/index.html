<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiliate Intelligence</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #3b82f6; --primary-hover: #2563eb;
            --text: #f8fafc; --muted: #94a3b8; --faint: #64748b;
            --green: #10b981; --yellow: #f59e0b; --red: #ef4444;
            --head: system-ui, -apple-system, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: var(--text); font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: var(--head); font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 8px; }
        .header p { color: var(--muted); font-size: 14px; }
        #app { width: 100%; max-width: 580px; }
        
        .card { background: var(--card); border-radius: 20px; padding: 32px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05); margin-bottom: 20px; }
        
        .step-title { font-family: var(--head); font-size: 20px; font-weight: 700; margin-bottom: 24px; line-height: 1.3; }
        .step-icon { font-size: 32px; margin-bottom: 12px; }
        input[type="text"], textarea { width: 100%; background: #0f172a; border: 2px solid #334155; color: white; padding: 16px; border-radius: 12px; font-size: 16px; outline: none; transition: 0.2s; margin-bottom: 8px;}
        input[type="text"]:focus, textarea:focus { border-color: var(--primary); }
        
        .btn-row { display: flex; gap: 12px; margin-top: 30px; }
        .btn { flex: 1; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; border: none; transition: 0.2s; text-decoration: none;}
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-ghost { background: transparent; color: var(--muted); border: 1px solid #334155; }
        .btn-ghost:hover { background: #334155; color: white; }
        .btn-meta { background: rgba(59, 130, 246, 0.1); color: var(--primary); border: 1px solid var(--primary); width: 100%; display: block; text-align: center; margin-top: 15px;}
        .btn-meta:hover { background: var(--primary); color: white; }
        
        .opts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt-btn { background: #0f172a; border: 2px solid #334155; color: white; padding: 16px; border-radius: 12px; text-align: left; cursor: pointer; transition: 0.2s; display: flex; flex-direction: column; gap: 4px; }
        .opt-btn:hover { border-color: #475569; }
        .opt-btn.selected { border-color: var(--primary); background: rgba(59,130,246,0.1); }
        .opts { display: flex; flex-direction: column; gap: 8px; }
        .opts-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
        .chip { background: #0f172a; border: 1px solid #334155; color: var(--muted); padding: 10px 16px; border-radius: 30px; cursor: pointer; font-size: 14px; transition: 0.2s; }
        .chip.selected { background: var(--primary); color: white; border-color: var(--primary); }
        .opt-desc { font-size: 12px; color: var(--faint); font-weight: 400; }
        
        .progress-wrap { margin-bottom: 24px; }
        .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--faint); font-weight: 600; margin-bottom: 8px; }
        .progress-bar { height: 6px; background: #334155; border-radius: 10px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); transition: width 0.3s ease; }

        .spinner { width: 40px; height: 40px; border: 4px solid #334155; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .log-box { background: #0f172a; border-radius: 12px; padding: 16px; font-family: monospace; font-size: 12px; margin-top: 20px; text-align: left; }
        .log-line { margin-bottom: 6px; }
        
        .verdict-card { padding: 24px; border-radius: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
        .big-score { font-size: 48px; font-weight: 900; line-height: 1; font-family: var(--head); }
        .score-label { font-size: 12px; color: var(--faint); font-weight: 700; text-align: center; margin-top: 4px; }
        .verdict-badge { padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 800; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .gauges-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-top: 20px; }
        .gauge-wrap { display: flex; flex-direction: column; align-items: center; text-align: center; background: #0f172a; padding: 16px; border-radius: 12px; }
        .gauge-label { font-size: 11px; color: var(--muted); font-weight: 700; margin-top: 10px; line-height: 1.2; text-transform: uppercase;}
        .gauge-source { font-size: 9px; color: var(--faint); margin-top: 6px; }
        .section-label { font-size: 13px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; border-bottom: 1px solid #334155; padding-bottom: 8px; }
        
        .angle-item { background: rgba(59, 130, 246, 0.05); border-left: 3px solid var(--primary); padding: 12px 16px; margin-bottom: 10px; border-radius: 0 8px 8px 0; font-size: 13.5px; color: #e2e8f0; line-height: 1.5; }
        .ai-stats { font-size: 12px; color: var(--muted); margin-top: 16px; border-top: 1px dashed #334155; padding-top: 16px; text-align: center; line-height: 1.6; }
        .ai-stats span { display: inline-block; background: #1e293b; padding: 4px 10px; border-radius: 6px; border: 1px solid #334155; margin: 4px; }
    </style>
</head>
<body>

<div class="header">
    <h1>⚡ Affiliate Intelligence</h1>
    <p>Meta Ads · YouTube Insights · Mercado Libre · Márgenes</p>
</div>

<div id="app"></div>

<script>
const COUNTRIES = [
  { code:"BO", name:"Bolivia 🇧🇴", notes:"Alta penetración de RRSS" },
  { code:"MX", name:"México 🇲🇽", notes:"Gran volumen, alta competencia" },
  { code:"CO", name:"Colombia 🇨🇴", notes:"Buen ecommerce y pagos" },
  { code:"CL", name:"Chile 🇨🇱", notes:"Mayor poder adquisitivo" },
  { code:"LATAM", name:"Latinoamérica 🌎", notes:"Análisis regional amplio" }
];

const PRODUCT_TYPES = [
  { id:"digital",  label:"Digital",  desc:"Cursos, ebooks, software...", icon:"💻" },
  { id:"physical", label:"Físico",   desc:"Suplementos, ropa, gadgets...", icon:"📦" },
  { id:"service",  label:"Servicio", desc:"SaaS, membresías...", icon:"⚙️" },
  { id:"hybrid",   label:"Híbrido",  desc:"Combinación de ambos", icon:"🔗" }
];

const PRICES = ["Menos de $30","$30 - $100","$100 - $300","Más de $300","Suscripción"];
const PLATFORMS = ["Instagram/Reels","TikTok","YouTube","Facebook Ads","Google Ads","WhatsApp"];

const STEPS = [
  { id:"country",     title:"¿En qué mercado quieres vender?", icon:"🌎" },
  { id:"productType", title:"¿Qué tipo de producto es?", icon:"📦" },
  { id:"product",     title:"¿Cuál es la palabra clave del producto?", icon:"✏️" },
  { id:"price",       title:"¿Cuál es el rango de precio?", icon:"💰" },
  { id:"commission",  title:"¿Cuánto paga de comisión al afiliado?", icon:"📊" },
  { id:"target",      title:"¿A quién va dirigido? (Público)", icon:"🎯" },
  { id:"platforms",   title:"¿Dónde planeas promocionarlo?", icon:"📱" }
];

const DIM_LABELS = { 
    demand: "Demanda Comercial", 
    meta_ads: "Anuncios en Meta",
    social_interest: "Interés YouTube", 
    competition: "Baja Competencia",
    margin: "Margen Ganancia",
    viral_potential: "Potencial Viral"
};

let state = {
  stage: "idle", step: 0,
  data: { country:"BO", productType:"", product:"", price:"", commission:"", target:"", platforms:[] },
  result: null, logs: []
};

function set(key, val, skipRender = false) {
    state.data[key] = val; 
    if (skipRender === true) {
        let btnSiguiente = document.getElementById('btn-next');
        if (btnSiguiente) { btnSiguiente.disabled = (val.trim() === ''); }
    } else { render(); }
}

function togglePlatform(p) {
  const pl = state.data.platforms;
  state.data.platforms = pl.includes(p) ? pl.filter(x=>x!==p) : [...pl, p];
  render();
}

function gaugeHTML(value, label, source, color) {
  const r=28, circ=2*Math.PI*r, fill=(value/100)*circ;
  return `
    <div class="gauge-wrap">
      <svg width="70" height="70" viewBox="0 0 70 70">
        <circle cx="35" cy="35" r="${r}" fill="none" stroke="#1f2937" stroke-width="6"/>
        <circle cx="35" cy="35" r="${r}" fill="none" stroke="${color}" stroke-width="6"
          stroke-dasharray="${fill} ${circ}" stroke-linecap="round" transform="rotate(-90 35 35)"/>
        <text x="35" y="41" text-anchor="middle" fill="white" font-size="13" font-weight="700" font-family="monospace">${value}</text>
      </svg>
      <div class="gauge-label">${label}</div>
      <div class="gauge-source">${source}</div>
    </div>`;
}

function dimColor(s) { return s>=70?"#10b981":s>=40?"#f59e0b":"#ef4444"; }

function render() {
  const app = document.getElementById("app");
  const { stage, step, data, result, logs } = state;

  if (stage === "idle") {
    app.innerHTML = `
      <div class="card" style="text-align:center">
        <div style="font-size:46px;margin-bottom:12px">🎯</div>
        <h2 style="font-family:var(--head);font-size:19px;font-weight:800;margin-bottom:8px">Valida tu producto afiliado</h2>
        <p style="color:var(--muted);line-height:1.75;font-size:13px;margin-bottom:20px">Análisis completo impulsado por Inteligencia Artificial (Gemini).</p>
        <button class="btn btn-primary" onclick="goCollect()">Comenzar análisis →</button>
      </div>`;
    return;
  }

  if (stage === "collecting") {
    const cur = STEPS[step];
    const total = STEPS.length;
    const prog = (step / total) * 100;
    const canNext = cur.id === "platforms" ? data.platforms.length > 0 : !!data[cur.id];

    let inputHTML = "";
    if (cur.id === "country") {
      inputHTML = `<div class="opts">${COUNTRIES.map(c=>`<button class="opt-btn ${data.country===c.code?'selected':''}" onclick="set('country','${c.code}')">${c.name} <div class="opt-desc">${c.notes}</div></button>`).join("")}</div>`;
    } else if (cur.id === "productType") {
      inputHTML = `<div class="opts-grid">${PRODUCT_TYPES.map(t=>`<button class="opt-btn ${data.productType===t.id?'selected':''}" onclick="set('productType','${t.id}')"><span>${t.icon} ${t.label}</span><div class="opt-desc">${t.desc}</div></button>`).join("")}</div>`;
    } else if (cur.id === "product") {
      inputHTML = `<input type="text" id="inp" value="${data.product}" placeholder="Ej: curso de jabones artesanales..." oninput="set('product',this.value,true)" onkeydown="if(event.key==='Enter' && this.value.trim()!=='')nextStep()">`;
    } else if (cur.id === "price") {
      inputHTML = `<div class="opts">${PRICES.map(p=>`<button class="opt-btn ${data.price===p?'selected':''}" onclick="set('price','${p}')">${p}</button>`).join("")}</div>`;
    } else if (cur.id === "commission") {
      inputHTML = `<input type="text" id="inp" value="${data.commission}" placeholder="Ej: 50%, $20 dólares..." oninput="set('commission',this.value,true)" onkeydown="if(event.key==='Enter' && this.value.trim()!=='')nextStep()">`;
    } else if (cur.id === "target") {
      inputHTML = `<input type="text" id="inp" value="${data.target}" placeholder="Ej: mujeres emprendedoras..." oninput="set('target',this.value,true)" onkeydown="if(event.key==='Enter' && this.value.trim()!=='')nextStep()">`;
    } else if (cur.id === "platforms") {
      inputHTML = `<div class="opts-wrap">${PLATFORMS.map(p=>`<button class="chip ${data.platforms.includes(p)?'selected':''}" onclick="togglePlatform('${p}')">${data.platforms.includes(p)?'✓ ':''}${p}</button>`).join("")}</div>`;
    }

    app.innerHTML = `
      <div class="progress-wrap">
        <div class="progress-meta"><span>Paso ${step+1} de ${total}</span></div>
        <div class="progress-bar"><div class="progress-fill" style="width:${prog}%"></div></div>
      </div>
      <div class="card">
        <div class="step-icon">${cur.icon}</div>
        <div class="step-title">${cur.title}</div>
        ${inputHTML}
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="${step===0?'goIdle()':'prevStep()'}">← Atrás</button>
          <button id="btn-next" class="btn btn-primary" ${canNext?'':'disabled'} onclick="nextStep()">${step===total-1?'🔍 Analizar Producto':'Siguiente →'}</button>
        </div>
      </div>`;
      
    setTimeout(()=>{ const el=document.getElementById("inp"); if(el) el.focus(); }, 50);
    return;
  }

  if (stage === "analyzing") {
    app.innerHTML = `
      <div class="card" style="text-align:center">
        <div class="spinner"></div>
        <h3 style="font-family:var(--head);font-size:17px;font-weight:700;margin-bottom:7px">Procesando con IA...</h3>
        <div class="log-box">${logs.map(l=>`<div class="log-line">› ${l}</div>`).join("")}</div>
      </div>`;
    return;
  }

  if (stage === "results" && result) {
    const vc = result.verdict === "ALTA OPORTUNIDAD" ? "#10b981" : result.verdict === "VIABLE" ? "#f59e0b" : "#ef4444";
    const dims = result.dimensions;
    const dimKeys = ["demand", "meta_ads", "social_interest", "competition", "margin", "viral_potential"];

    // Enlace directo a la librería de Meta Ads
    const metaCountry = data.country === "LATAM" ? "ALL" : data.country;
    const metaUrl = `https://www.facebook.com/ads/library/?active_status=active&ad_type=all&country=${metaCountry}&q=${encodeURIComponent(data.product)}`;

    let anglesHTML = "";
    if (result.angles && result.angles.length > 0) {
        
        let metaStatsText = result.stats.meta_ads === "Estimado por IA" 
          ? `📢 Volumen estimado por IA (Sin Scraper)` 
          : `📢 <strong>${result.stats.meta_ads}</strong> anuncios reales encontrados`;

        anglesHTML = `
        <div class="card">
            <div class="section-label" style="color:var(--primary)">🧠 Ángulos de Venta (Insights YouTube)</div>
            ${result.angles.map(a => `<div class="angle-item">${a}</div>`).join("")}
            
            <div class="ai-stats">
              <div style="margin-bottom:8px;">📊 <strong>Transparencia de Datos</strong></div>
              <span>▶️ <strong>${result.stats.videos}</strong> videos analizados</span>
              <span>💬 <strong>${result.stats.comments}</strong> comentarios procesados</span>
              <span>${metaStatsText}</span>
            </div>
        </div>`;
    }

    app.innerHTML = `
      <div class="results">
        <div class="verdict-card" style="background:rgba(255,255,255,.03);border:1px solid ${vc}28">
          <div style="flex:1">
            <h2 style="font-family:var(--head);font-size:18px;font-weight:800;margin-bottom:9px">${data.product}</h2>
            <span class="verdict-badge" style="background:${vc}20;border:1px solid ${vc}40;color:${vc}">${result.verdict}</span>
          </div>
          <div>
            <div class="big-score" style="color:${vc}">${result.overall_score}</div>
            <div class="score-label">/100</div>
          </div>
        </div>

        <div class="card">
          <div class="section-label">Métricas de Validación Integral</div>
          <div class="gauges-grid">
            ${dimKeys.map(k => {
                const dim = dims[k];
                if(!dim) return '';
                return gaugeHTML(dim.score, DIM_LABELS[k], dim.label, dimColor(dim.score));
            }).join("")}
          </div>
          <a href="${metaUrl}" target="_blank" class="btn btn-meta">👀 Ver Anuncios Reales de Competidores en Meta Ads</a>
        </div>

        ${anglesHTML}

        <button class="btn btn-ghost" onclick="goIdle()" style="width:100%; margin-top:10px;">← Nuevo Análisis</button>
      </div>`;
  }
}

function goIdle() { state = { stage:"idle", step:0, data:{ country:"BO", productType:"", product:"", price:"", commission:"", target:"", platforms:[] }, result:null, logs:[] }; render(); }
function goCollect() { state.stage="collecting"; state.step=0; render(); }
function prevStep() { if(state.step>0){ state.step--; render(); } }
function nextStep() { if(state.step+1 < STEPS.length) { state.step++; render(); } else runAnalysis(); }

async function runAnalysis() {
  state.stage = "analyzing"; state.logs = []; render();
  const log = (msg) => { state.logs.push(msg); render(); };

  try {
    log("Extrayendo comentarios y analizando Ads...");
    log("Validando competencia con IA...");
    
    const resp = await fetch("/api/analyze", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify(state.data)
    });

    if (!resp.ok) throw new Error("Fallo en la conexión");
    
    log("Análisis terminado ✓");
    state.result = await resp.json();
    state.stage = "results";
    render();

  } catch(e) {
    log("Error: Asegúrate de que el Backend esté corriendo.");
    setTimeout(goCollect, 3000);
  }
}

render();
</script>
</body>
</html>
